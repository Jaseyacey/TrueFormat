services:
  - type: web
    name: trueformat-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disks:
      - name: trueformat-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_PATH
        value: /var/data/trueformat.db
      - key: ALLOW_SCANNED_PDFS
        value: "false"
      - key: UPLOAD_PAGE_LIMIT
        value: "2"
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_AUTH_AUD
        value: authenticated
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  - type: static
    name: trueformat-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://trueformat.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
